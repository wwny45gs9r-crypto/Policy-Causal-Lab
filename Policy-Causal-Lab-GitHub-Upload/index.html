<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy Causal Lab</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        color: #17252a;
        background: #f4f7f6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(680px, calc(100vw - 40px));
        background: #fff;
        border: 1px solid #d7e2e0;
        border-radius: 8px;
        padding: 34px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        margin: 0 0 22px;
        color: #5f7374;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 6px;
        background: #24656a;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
      code {
        background: #eef5f4;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Policy Causal Lab</h1>
      <p>这是本地启动页。请先启动前端和后端服务，然后进入 Web 应用。</p>
      <p>默认地址：<code>http://localhost:3000</code></p>
      <a href="http://localhost:3000">进入应用</a>
    </main>
  </body>
</html>
