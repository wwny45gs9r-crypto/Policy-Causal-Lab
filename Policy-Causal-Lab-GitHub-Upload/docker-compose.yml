services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: policy_lab
      POSTGRES_USER: policy_lab
      POSTGRES_PASSWORD: policy_lab
    ports:
      - "5432:5432"
    volumes:
      - policy_lab_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://policy_lab:policy_lab@postgres:5432/policy_lab
      FRONTEND_ORIGIN: http://localhost:3000
      STORAGE_ROOT: storage/projects
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  policy_lab_postgres:
